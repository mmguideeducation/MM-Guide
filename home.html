<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Guide</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body,html{
  height:100%;
  width:100%;
  font-family:Arial, sans-serif;
}

/* Loader screen */
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* Spinner */
.spinner{
  width:50px;
  height:50px;
  border:5px solid #ddd;
  border-top:5px solid #1e88e5;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.loading-text{
  font-size:18px;
  color:#333;
  letter-spacing:1px;
}

/* iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading content...</div>
</div>

<!-- Iframe -->
<iframe id="viewer"></iframe>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8RiAQ8mYFISoqntnvSPsZMVKZ20SKXG9Qc4PGNP7z2fWpBaVJKVumuhzwhs1c234/exec";

async function loadIframe(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    const iframe = document.getElementById("viewer");
    iframe.src = data.iframeUrl;

    // Hide loader only when iframe fully loads
    iframe.onload = function(){
      document.getElementById("loading").style.display = "none";
    };

  }catch(e){
    document.querySelector(".loading-text").innerText = "Failed to load content.";
  }
}

loadIframe();
</script>

</body>
</html>
