<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Guide</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🌈 Background Gradient */
body{
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* 🔥 Loader Screen FIX */
#loading{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #667eea, #764ba2);
  z-index: 9999;
}

/* 🔥 Inner Box Center Fix */
.loader-box{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px 40px;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* 🔥 Spinner Center Fix */
.spinner{
  width:60px;
  height:60px;
  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  margin-bottom:15px;
}

.spinner::before,
.spinner::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:4px solid transparent;
}

.spinner::before{
  border-top-color:#ffffff;
  border-bottom-color:#22c55e;
  animation:spin 1s linear infinite;
}

.spinner::after{
  border-left-color:#f59e0b;
  border-right-color:#ef4444;
  animation:spinReverse 1.2s linear infinite;
}

/* Text */
.loading-text{
  font-size:18px;
  color:#fff;
  letter-spacing:1px;
  animation:pulse 1.5s infinite;
}

/* iframe */
iframe{
  width:100vw;
  height:100vh;
  border:none;
  display:block;
}

/* Animations */
@keyframes spin{
  100%{ transform:rotate(360deg); }
}

@keyframes spinReverse{
  100%{ transform:rotate(-360deg); }
}

@keyframes pulse{
  0%,100%{ opacity:1; }
  50%{ opacity:0.5; }
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 📱 Mobile */
@media (max-width:480px){
  .loader-box{
    padding:20px;
  }

  .spinner{
    width:50px;
    height:50px;
  }

  .loading-text{
    font-size:16px;
  }
}
</style>
</head>

<body>

<!-- 🔥 Loader -->
<div id="loading">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loading-text">Loading MM Guide...</div>
  </div>
</div>

<!-- 📄 Iframe -->
<iframe id="viewer"></iframe>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8RiAQ8mYFISoqntnvSPsZMVKZ20SKXG9Qc4PGNP7z2fWpBaVJKVumuhzwhs1c234/exec";

async function loadIframe(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    const iframe = document.getElementById("viewer");
    iframe.src = data.iframeUrl;

    iframe.onload = function(){
      // 🔥 Smooth fade out
      const loader = document.getElementById("loading");
      loader.style.transition = "opacity 0.4s ease";
      loader.style.opacity = "0";

      setTimeout(() => {
        loader.style.display = "none";
      }, 400);
    };

  }catch(e){
    document.querySelector(".loading-text").innerText = "❌ Failed to load content";
  }
}

loadIframe();
</script>

</body>
</html>
